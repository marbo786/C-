<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Student Vault System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Admin Panel</h2>
            <a href="{{ url_for('index') }}" class="btn btn-outline">Log Out / Home</a>
        </div>
        
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Major</th>
                        <th>Age</th>
                        <th>Created</th>
                    </tr>
                </thead>
                <tbody>
                    {% for profile in profiles %}
                    <tr>
                        <td>{{ profile[0] }}</td>
                        <td>
                            {% if profile[4] %}
                                <img src="{{ url_for('static', filename='uploads/' + profile[4]) }}" alt="Thumbnail" class="thumbnail">
                            {% else %}
                                <span>No Image</span>
                            {% endif %}
                        </td>
                        <td>{{ profile[1] }}</td>
                        <td>{{ profile[2] }}</td>
                        <td>{{ profile[3] }}</td>
                        <td>{{ profile[5] }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="6" class="text-center">No profiles found.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
